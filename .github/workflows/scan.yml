name: Vulnerability Scan

on:
  push:
    branches: [ "main" ]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull Image
        run: docker pull ghcr.io/dimitristz001/busybox-test:latest

      - name: Scan with Docker Scout
        run: docker scout cves ghcr.io/dimitristz001/busybox-test:latest
