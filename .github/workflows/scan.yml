name: Busybox Vulnerability scan 

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      #checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      #Log in GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      #Install Docker Scout
      - name: Install Docker Scout
        run: |
          sudo apt update
          sudo apt install -y docker-scout-plugin

      #Scan the  image
      - name: Scan Docker image
        run: |
          docker scout cves ghcr.io/dimitristz001/busybox-test:latest
