name: Busybox Vulnerability Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Docker Scout scan on Busybox
        run: |
          docker scout cves ghcr.io/dimitristz001/busybox-test:latest
